spring:
  application:
    name: spring-support-portal
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:supportportal}
    username: ${DB_USER:portal}
    password: ${DB_PASSWORD:portal}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:25}

server:
  port: ${SERVER_PORT:8000}
  error:
    include-message: always
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    mail:
      enabled: false
    ldap:
      enabled: false

logging:
  level:
    root: INFO
    com.nullify.supportportal: DEBUG

app:
  jwt:
    secret: ${JWT_SECRET:dev-jwt-secret-please-rotate-in-prod-0123456789abcdef}
    access-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:15}
  uploads:
    dir: ${UPLOADS_DIR:/app/uploads}
