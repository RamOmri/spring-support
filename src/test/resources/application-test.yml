spring:
  datasource:
    url: ${TEST_DB_URL:jdbc:postgresql://localhost:5433/main}
    username: ${TEST_DB_USER:main}
    password: ${TEST_DB_PASSWORD:main}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: true
